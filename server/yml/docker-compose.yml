services:
  db:
    image: postgres:16
    container_name: item-exchange-db
    restart: always
    environment:
      POSTGRES_USER: item_user
      POSTGRES_PASSWORD: item_pass
      POSTGRES_DB: item_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
