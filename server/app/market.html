<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>裝備市場 | Market</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #0f162a;
        --card: #11172a;
        --accent: #c084fc;
        --accent-2: #38bdf8;
        --amber: #fbbf24;
        --green: #34d399;
        --red: #f87171;
      }
      body {
        font-family: "Manrope", "Space Grotesk", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.12), transparent 26%),
          radial-gradient(circle at 90% 10%, rgba(192, 132, 252, 0.14), transparent 25%),
          radial-gradient(circle at 50% 90%, rgba(251, 191, 36, 0.12), transparent 30%),
          linear-gradient(160deg, #090d1a 0%, #0c1224 40%, #0b1020 100%);
        color: #e5e7eb;
      }
      .nice-scroll {
        scrollbar-width: thin;
        scrollbar-color: #475569 #0f172a;
      }
      .nice-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .nice-scroll::-webkit-scrollbar-track {
        background: #0f172a;
      }
      .nice-scroll::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #38bdf8, #a855f7);
        border-radius: 999px;
      }
      .glass {
        background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(14px);
      }
      .title-accent {
        letter-spacing: 0.08em;
      }
      .chip {
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      #klineChart { min-height: 280px; position: relative; }
      #klineStatus { position: absolute; top: 8px; right: 12px; z-index: 10; }
      .drawer-overlay { transition: opacity 0.25s ease, visibility 0.25s ease; }
      .drawer-panel { transition: transform 0.28s ease; }
      body.drawer-open { overflow: hidden; }
      body.drawer-open #userDrawerOverlay { opacity: 1; visibility: visible; pointer-events: auto; }
      body.drawer-open #userDrawer { transform: translateX(0); }
      @media (max-width: 1024px) {
        header .title-block { width: 100%; }
        #klineChart { min-height: 240px; }
      }
      @media (max-width: 640px) {
        body { padding-bottom: 16px; }
        .content-grid { grid-template-columns: 1fr !important; gap: 14px; }
        header .action-row { width: 100%; justify-content: flex-end; }
      }
    </style>
    <script src="./lightweight-charts.standalone.production.js"></script>
  </head>

                </div>

                </div>

              </div>
              <div class="border border-slate-800 rounded-lg p-2 bg-slate-900/60">

                  <button id="topupButton" class="px-2 py-0.5 rounded-full bg-cyan-500/80 text-slate-900 text-[11px] font-semibold hover:bg-cyan-400">儲值</button>
                </div>
                <div class="flex justify-between text-xs"><span class="text-slate-400">可用</span><span id="walletAvailable" class="font-semibold text-emerald-300">0</span></div>
                <div class="flex justify-between text-xs"><span class="text-slate-400">凍結</span><span id="walletFrozen" class="font-semibold text-amber-300">0</span></div>
                <div class="flex justify-between text-xs"><span class="text-slate-400">總額</span><span id="walletTotal" class="font-semibold text-slate-100">0</span></div>
              </div>
              <div>
                <div class="flex items-center justify-between text-xs text-slate-400 mb-1"><span>我的掛單</span></div>
                <div id="myOrders" class="space-y-1 max-h-28 overflow-y-auto text-xs nice-scroll"></div>
              </div>
            </div>
          </div>

          <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-3 space-y-3">
            <div class="flex items-center justify-between">
              <div class="text-sm font-semibold">背包物品</div>
            </div>
            <div id="inventoryList" class="space-y-2 max-h-40 overflow-y-auto text-xs text-slate-300 nice-scroll">
              <p class="text-slate-500">登入後可查看背包。</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script>
      // 後端 API 基底：已替換為你的 ngrok URL
      const API_BASE = "https://tapes-june-addresses-mount.trycloudflare.com";
      const NGROK_BYPASS_HEADER = { "ngrok-skip-browser-warning": "true" };
      const LEVEL_UP_EXP = 100;

      let currentUser = null;
      let profile = null;
      let allItems = [];
      let selectedItem = null;
      let chart = null;
      let candleSeries = null;
      let chartLibPromise = null;
      let lineFallback = false;
      let lastTradePrice = null;
      let priceLockedByUser = false;

      const messageBox = document.getElementById("message");
      let toastTimer = null;
      let dropdownTimer = null;
      const loginButton = document.getElementById("loginButton");
      const mobileMenuBtn = document.getElementById("mobileMenuBtn");
      const profileBadge = document.getElementById("profileBadge");
      const userMenuWrapper = document.getElementById("userMenuWrapper");

      const userMenuLabel = document.getElementById("userMenuLabel");
      const userMenuAvatar = document.getElementById("userMenuAvatar");
      const userDropdown = document.getElementById("userDropdown");
      const personalCenterLink = document.getElementById("personalCenterLink");
      const logoutBtnDesktop = document.getElementById("logoutBtnDesktop");

      const itemDropdownBtn = document.getElementById("itemDropdownBtn");

      const itemDropdownPanel = document.getElementById("itemDropdownPanel");
      const itemSearchInput = document.getElementById("itemSearchInput");
      const itemListPanel = document.getElementById("itemListPanel");
      const selectedItemName = document.getElementById("selectedItemName");
      const selectedItemPrice = document.getElementById("selectedItemPrice");
      const asksStack = document.getElementById("asksStack");
      const bidsStack = document.getElementById("bidsStack");
      const midPriceLabel = document.getElementById("midPriceLabel");
      const midSubLabel = document.getElementById("midSubLabel");
      const buyPctLabel = document.getElementById("buyPctLabel");
      const sellPctLabel = document.getElementById("sellPctLabel");
      const buyPctBar = document.getElementById("buyPctBar");
      const sellPctBar = document.getElementById("sellPctBar");
      const high24Label = document.getElementById("high24Label");
      const low24Label = document.getElementById("low24Label");
      const change24Label = document.getElementById("change24Label");

      const priceInput = document.getElementById("price");
      const qtyInput = document.getElementById("qty");
      const totalPriceSpan = document.getElementById("totalPrice");
      const buyButton = document.getElementById("buyButton");
      const sellButton = document.getElementById("sellButton");

      const accountInfoGuest = document.getElementById("accountInfoGuest");
      const accountInfo = document.getElementById("accountInfo");
      const accountUserLabel = document.getElementById("accountUserLabel");
      const levelLabel = document.getElementById("levelLabel");
      const expLabel = document.getElementById("expLabel");
      const expBar = document.getElementById("expBar");
      const myOrdersDiv = document.getElementById("myOrders");
      const walletAvailable = document.getElementById("walletAvailable");
      const walletFrozen = document.getElementById("walletFrozen");
      const walletTotal = document.getElementById("walletTotal");
      const topupButton = document.getElementById("topupButton");
      const inventoryList = document.getElementById("inventoryList");
      const userDrawer = document.getElementById("userDrawer");
      const userDrawerOverlay = document.getElementById("userDrawerOverlay");
      const drawerUserLabel = document.getElementById("drawerUserLabel");
      const drawerUserDesc = document.getElementById("drawerUserDesc");
      const drawerCloseBtn = document.getElementById("drawerCloseBtn");
      const logoutButton = document.getElementById("logoutButton");
      const userMenuArrow = document.getElementById("userMenuArrow");
      const guestButtonClass =
        "flex items-center gap-2 px-5 py-2.5 rounded-2xl bg-gradient-to-r from-fuchsia-400 to-cyan-300 text-slate-900 font-semibold shadow-lg shadow-fuchsia-500/30 hover:scale-[1.02] transition";
      const userButtonClass =
        "group flex items-center gap-3 px-4 py-2 rounded-2xl bg-slate-900/70 border border-slate-700/70 text-slate-100 font-semibold shadow-lg hover:border-cyan-300/60 transition focus:outline-none focus:ring-1 focus:ring-cyan-300/60";

      function randomDiscordId() {
        return Math.floor(100000 + Math.random() * 900000).toString();
      }
      function randomUserName() {
        const n = Math.floor(100 + Math.random() * 900);
        return `USER${n}`;
      }

      function showMessage(text, type = "info") {
        clearMessage();
        messageBox.textContent = text;
        const base = "glass rounded-xl px-4 py-3 text-sm fixed top-4 right-4 z-50";
        const styles =
          type === "error"
            ? "border border-rose-500/40 text-rose-200 bg-rose-500/10"
            : "border border-cyan-500/40 text-cyan-100 bg-cyan-500/10";
        messageBox.className = base + " " + styles;
        toastTimer = setTimeout(() => {
          clearMessage();
        }, 2000);
      }
      function clearMessage() {
        if (toastTimer) {
          clearTimeout(toastTimer);
          toastTimer = null;
        }
        messageBox.className = "hidden";
        messageBox.textContent = "";
      }

      function closeUserDrawer() {
        document.body.classList.remove("drawer-open");
        userDrawerOverlay.classList.add("invisible");
        userDrawerOverlay.classList.add("pointer-events-none");
      }

      function openUserDrawer() {
        if (!currentUser) return;
        const label = currentUser.discord_name || currentUser.discord_id;
        drawerUserLabel.textContent = label || "USER";
        drawerUserDesc.textContent = currentUser.discord_id ? `ID #${currentUser.discord_id}` : "-";
        userDrawerOverlay.classList.remove("invisible");
        userDrawerOverlay.classList.remove("pointer-events-none");
        document.body.classList.add("drawer-open");
      }

            function performLogout() {
        currentUser = null;
        profile = null;
        localStorage.removeItem("virtual_exchange_user");
        renderAuthUI();
        inventoryList.innerHTML = '<p class="text-slate-500">登入後可查看倉庫</p>';
        myOrdersDiv.innerHTML = "";
        walletAvailable.textContent = "0";
        walletFrozen.textContent = "0";
        walletTotal.textContent = "0";
        closeUserDrawer();
        showMessage("已登出");
      }

      function renderAuthUI() {
        if (!currentUser) {
          if (loginButton) {
            loginButton.textContent = "登入";
            loginButton.classList.remove("hidden");
          }
          if (userMenuWrapper) userMenuWrapper.classList.remove("hidden");
          if (userDropdown) userDropdown.classList.add("hidden");
          if (userMenuLabel) userMenuLabel.textContent = "登入";
          if (userMenuAvatar) {
            userMenuAvatar.textContent = "";
            userMenuAvatar.classList.add("hidden");
          }
          if (userMenuArrow) userMenuArrow.classList.add("hidden");
          if (userMenuButton) userMenuButton.className = guestButtonClass;

      function renderStackedBook(rawAsks = [], rawBids = []) {
        // Sell side: lowest at top, highest at bottom.
        const asks = [...rawAsks].sort((a, b) => a.price - b.price);
        const bids = [...rawBids].sort((a, b) => b.price - a.price); // 倉支無變動順序維持高價在上方

        renderSideStack(asks, asksStack, true);
        renderSideStack(bids, bidsStack, false);
        // Keep sell list scrolled to bottom so highest price stays visible after refresh.
        if (asksStack) {
          requestAnimationFrame(() => {
            asksStack.scrollTop = asksStack.scrollHeight;
          });
        }

        const sellVol = asks.reduce((s, x) => s + Number(x.qty), 0);
        const buyVol = bids.reduce((s, x) => s + Number(x.qty), 0);
        const totalVol = sellVol + buyVol || 1;
        const buyPct = Math.round((buyVol / totalVol) * 100);
        const sellPct = 100 - buyPct;
        buyPctLabel.textContent = `買單 ${buyPct}%`;
        sellPctLabel.textContent = `賣單 ${sellPct}%`;
        buyPctBar.style.width = `${buyPct}%`;
        sellPctBar.style.width = `${sellPct}%`;
        sellPctBar.style.marginLeft = `${buyPct}%`;

        const bestAsk = asks.length ? Number(asks[0].price) : null;
        const bestBid = bids.length ? Number(bids[0].price) : null;
        const mid = lastTradePrice !== null ? lastTradePrice : bestBid !== null && bestAsk !== null
          ? (bestBid + bestAsk) / 2
          : bestBid ?? bestAsk ?? null;
        let refMid = mid;
        if (refMid === null && selectedItem && Number.isFinite(Number(selectedItem.initial_price))) {
          refMid = Number(selectedItem.initial_price);
        }
        if (refMid !== null) {
          midPriceLabel.textContent = `${Number(refMid).toLocaleString(undefined, {
            minimumFractionDigits: 0,
            maximumFractionDigits: 2,
          })} Z`;
        } else {
          midPriceLabel.textContent = "—";
        }
      }

      function renderSideStack(data, targetDiv, isSell) {

          targetDiv.innerHTML =

        let cumulative = 0;
        const combined = data.map((d) => {

      function updateIndicativePrice(bids = [], asks = []) {
        if (lastTradePrice !== null) {

        const bestBid = bids && bids.length ? Number(bids[0].price) : null;
        const bestAsk = asks && asks.length ? Number(asks[0].price) : null;
        let ref = null;
        if (bestBid !== null && bestAsk !== null) {
          ref = (bestBid + bestAsk) / 2;
        } else if (bestBid !== null) {
          ref = bestBid;
        } else if (bestAsk !== null) {
          ref = bestAsk;
        }
        if (ref === null && selectedItem && Number.isFinite(Number(selectedItem.initial_price))) {
          ref = Number(selectedItem.initial_price);
        }
        if (ref !== null) {
          setReferencePrice(ref);
        }

      function update24hHighLow(trades = []) {
        if (!high24Label || !low24Label || !change24Label) return;
        const reset = () => {
          high24Label.textContent = "24H High: --";
          low24Label.textContent = "24H Low: --";
          change24Label.textContent = "24H Change: --";
        };
        if (!Array.isArray(trades) || trades.length === 0) {
          reset();
          return;
        }
        const cutoff = Date.now() - 24 * 60 * 60 * 1000;
        const filtered = trades.filter((t) => {
          const ts = new Date(t.created_at).getTime();
          return Number.isFinite(ts) && ts >= cutoff;
        });
        const poolTrades = filtered.length ? filtered : trades;
        const pool = poolTrades
          .map((t) => Number(t.price))
          .filter((v) => Number.isFinite(v));
        if (!pool.length) {
          reset();
          return;
        }
        const high = Math.max(...pool);
        const low = Math.min(...pool);
        high24Label.textContent = `24H High: ${high.toLocaleString()} Z`;
        low24Label.textContent = `24H Low: ${low.toLocaleString()} Z`;
        const sorted = [...poolTrades].sort(
          (a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime()
        );
        const firstPrice = Number(sorted[0]?.price);
        const lastPrice = Number(sorted[sorted.length - 1]?.price);
        if (Number.isFinite(firstPrice) && firstPrice !== 0 && Number.isFinite(lastPrice)) {
          const pct = ((lastPrice - firstPrice) / firstPrice) * 100;
          const sign = pct > 0 ? "+" : "";
          change24Label.textContent = `24H Change: ${sign}${pct.toFixed(2)}%`;
        } else {
          change24Label.textContent = "24H Change: --";
        }
      }
      async function loadTrades(itemId) {
        const klineStatus = document.getElementById("klineStatus");
        if (!itemId) return;
        try {
          const ok = await ensureChart();
          if (!ok) {
            klineStatus.textContent = "載入 K 線套件失敗（可能被網路/CSP 擋下）";
            update24hHighLow([]);
            return;
          }
          const trades = await fetchJSON(`/api/trades/${itemId}?limit=300`);
          if (!Array.isArray(trades) || trades.length === 0) {
            const base = selectedItem && Number.isFinite(Number(selectedItem.initial_price))
              ? Number(selectedItem.initial_price)
              : lastTradePrice || 100;
            const waveCandles = generateWaveCandles(base);
            ensureChart();
            if (candleSeries) {
              candleSeries.setData(candlesToWaveLine(waveCandles));
            }
            klineStatus.textContent = "尚無成交（展示波動中）";
            lastTradePrice = base;
            setReferencePrice(base);
            update24hHighLow([]);
            return;
          }
          lastTradePrice = Number(trades[trades.length - 1].price);
          const candles = aggregateToCandles(trades, 60);
          const candleData = candles.length >= 3 ? candles : generateWaveCandles(lastTradePrice);
          const waveLine = candlesToWaveLine(candleData);
          ensureChart();
          if (!candleSeries) {
            klineStatus.textContent = "圖表未初始化";
            return;
          }
          candleSeries.setData(waveLine);
          setReferencePrice(lastTradePrice);
          update24hHighLow(trades);
          klineStatus.textContent = `成交 ${trades.length} 筆 / ${candleData.length} 根`;
        } catch (err) {
          console.error("loadTrades error:", err);
          klineStatus.textContent = `載入失敗：${err.message || "unknown"}`;
          candleSeries && candleSeries.setData([]);
          update24hHighLow([]);
        }
      }

      function aggregateToCandles(trades, intervalSec = 60) {
        const buckets = new Map();
        trades.forEach((t) => {
          const ts = Math.floor(new Date(t.created_at).getTime() / 1000);
          const bucket = ts - (ts % intervalSec);
          const price = Number(t.price);
          const qty = Number(t.qty);
          if (!buckets.has(bucket)) {
            buckets.set(bucket, { time: bucket, open: price, high: price, low: price, close: price, volume: qty });
          } else {
            const c = buckets.get(bucket);
            c.high = Math.max(c.high, price);
            c.low = Math.min(c.low, price);
            c.close = price;
            c.volume += qty;
          }
        });
        return Array.from(buckets.values()).sort((a, b) => a.time - b.time);
      }

      function generateWaveCandles(basePrice, count = 24, stepSec = 30) {
        const candles = [];
        const now = Math.floor(Date.now() / 1000);
        const amplitude = basePrice * 0.02; // ±2% 波動
        for (let i = count - 1; i >= 0; i--) {
          const time = now - i * stepSec;
          const wave = Math.sin((i / count) * Math.PI * 2) * amplitude;
          const open = basePrice + wave * 0.5;
          const close = basePrice + wave;
          const high = Math.max(open, close) + amplitude * 0.2;
          const low = Math.min(open, close) - amplitude * 0.2;
          candles.push({
            time,
            open: Number(open.toFixed(2)),
            high: Number(high.toFixed(2)),
            low: Number(low.toFixed(2)),
            close: Number(close.toFixed(2)),
          });
        }
        return candles;
      }

      function candlesToWaveLine(candles) {
        if (!candles || !candles.length) return [];
        const line = [];
        const amp = Math.max(1, Number(candles[0].close) * 0.01);
        candles.forEach((c, idx) => {
          const jitter = Math.sin(idx) * amp * 0.2;
          line.push({
            time: c.time,
            value: Number(c.close) + jitter,
          });
        });
        return line;
      }

      async function ensureChart() {
        const ready = await ensureChartLib();
        if (!ready) return false;
        if (chart && candleSeries) return true;
        const container = document.getElementById("klineChart");
        container.innerHTML = ""; // 清空舊內容
        if (!window.LightweightCharts || typeof LightweightCharts.createChart !== "function") {
          console.error("LightweightCharts 未載入");
          return false;
        }
        chart = LightweightCharts.createChart(container, {
          layout: {
            background: { type: "solid", color: "rgba(0,0,0,0)" },
            textColor: "#cbd5f5",
          },
          grid: {
            vertLines: { color: "rgba(255,255,255,0.04)" },
            horzLines: { color: "rgba(255,255,255,0.04)" },
          },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
          rightPriceScale: { borderVisible: false, autoScale: true },
          timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false },
          width: container.clientWidth,
          height: container.clientHeight,
        });
        if (typeof chart.addLineSeries === "function") {
          candleSeries = chart.addLineSeries({
            color: "#22d3ee",
            lineWidth: 2,
          });
        } else if (typeof chart.addCandlestickSeries === "function") {
          // 極端情況，仍可用 K 線
          candleSeries = chart.addCandlestickSeries({
            upColor: "#22d3ee",
            downColor: "#f472b6",
            borderUpColor: "#22d3ee",
            borderDownColor: "#f472b6",
            wickUpColor: "#22d3ee",
            wickDownColor: "#f472b6",
          });
        } else {
          console.error("Chart API 缺少 series 建立方法，放棄繪圖");
          return false;
        }
        window.addEventListener("resize", () => {
          chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        });
        return true;
      }

      async function ensureChartLib() {
        if (window.LightweightCharts && typeof LightweightCharts.createChart === "function") {
          return true;
        }
        if (!chartLibPromise) {
          const sources = [
            "./lightweight-charts.standalone.production.js", // 本地檔案
            "https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.min.js",
            "https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js",
          ];
          chartLibPromise = (async () => {
            for (const src of sources) {
              const ok = await loadScriptOnce(src);
              if (ok && window.LightweightCharts && typeof LightweightCharts.createChart === "function") {
                return true;
              }
            }
            return false;
          })();
        }
        return chartLibPromise;
      }

      function loadScriptOnce(src) {
        return new Promise((resolve) => {
          const existing = Array.from(document.scripts).find((s) => s.src === src);
          if (existing) {
            existing.onload = () => resolve(true);
            existing.onerror = () => resolve(false);
            return;
          }
          const s = document.createElement("script");
          s.src = src;
          s.async = true;
          s.onload = () => resolve(true);
          s.onerror = () => resolve(false);
          document.head.appendChild(s);
        });
      }

      async function fetchJSON(path, options = {}) {
        const url = `${API_BASE || ""}${path}`;
        const headers = { ...(options.headers || {}), ...NGROK_BYPASS_HEADER };
        if (options.body && !(options.body instanceof FormData)) {
          headers["Content-Type"] = "application/json";
        }
        const res = await fetch(url, {
          method: options.method || "GET",
          headers,
          body: options.body && !(options.body instanceof FormData) ? JSON.stringify(options.body) : options.body,
        });
        const text = await res.text();
        let data;
        try {
          data = text ? JSON.parse(text) : null;
        } catch {
          throw new Error("伺服器回傳非 JSON");
        }
        if (!res.ok) {
          const detail = (data && data.detail) || res.statusText || "Request failed";
          throw new Error(detail);
        }
        return data;
      }

      // 初始化
      const savedUser = localStorage.getItem("virtual_exchange_user");
      if (savedUser) {
        try {
          currentUser = JSON.parse(savedUser);
        } catch {
          currentUser = null;
        }
      }
      renderAuthUI();
      loadItemTemplates();
      if (currentUser) {
        loadProfile();
        loadWallet();
        loadInventory();
        loadMyOrders();
      }

      // 簡單輪詢：每 3 秒刷新 orderbook、K 線與我的掛單（登入時）
      setInterval(() => {
        if (selectedItem) {
          loadOrderbook(selectedItem.id);
          loadTrades(selectedItem.id);
        }
        if (currentUser) {
          loadMyOrders();
          loadWallet();
          loadInventory();
        }
      }, 3000);
    </script>
  </body>
