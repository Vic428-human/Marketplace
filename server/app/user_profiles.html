<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #0f162a;
        --card: #11172a;
        --accent: #c084fc;
        --accent-2: #38bdf8;
        --amber: #fbbf24;
        --green: #34d399;
        --muted: #94a3b8;
      }
      body {
        font-family: "Manrope", "Space Grotesk", system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.12), transparent 26%),
          radial-gradient(circle at 90% 10%, rgba(192, 132, 252, 0.14), transparent 25%),
          radial-gradient(circle at 50% 90%, rgba(251, 191, 36, 0.12), transparent 30%),
          linear-gradient(160deg, #090d1a 0%, #0c1224 45%, #0b1020 100%);
        color: #e5e7eb;
        min-height: 100vh;
      }
      .glass {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
      }
      .chip {
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .grid-slot {
        background: linear-gradient(145deg, rgba(17, 24, 39, 0.85), rgba(15, 23, 42, 0.75));
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        min-height: 82px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        color: #cbd5f5;
        position: relative;
        overflow: hidden;
      }
      .grid-slot::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(168, 85, 247, 0.12), rgba(56, 189, 248, 0.12));
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .grid-slot.active::after {
        opacity: 1;
      }
      .grid-slot.selected {
        border-color: #38bdf8;
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.35), 0 10px 35px rgba(0, 0, 0, 0.35);
      }
      .grid-slot.equipped {
        border-color: #fbbf24;
        box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.4), 0 12px 40px rgba(251, 191, 36, 0.25);
      }
      .grid-slot .tag {
        font-size: 12px;
        color: #94a3b8;
      }
      .stat-pill {
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .pill-tab {
        transition: all 0.18s ease;
      }
      .pill-tab.active {
        background: linear-gradient(90deg, #38bdf8, #c084fc);
        color: #0b1020;
        border-color: transparent;
      }
      .hero-card {
        background: radial-gradient(circle at 30% 20%, rgba(120, 150, 255, 0.18), transparent 45%),
          radial-gradient(circle at 70% 80%, rgba(120, 255, 210, 0.14), transparent 45%),
          linear-gradient(145deg, #0c1324, #0b0f1f 45%, #0b0f1c);
        border: 1px solid rgba(148, 163, 184, 0.12);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      }
      .hero-avatar {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(96, 165, 250, 0.4), rgba(12, 26, 48, 0.9)),
          radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.35), rgba(12, 26, 48, 0.7));
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 8px 40px rgba(56, 189, 248, 0.25);
      }
      .lvl-pill {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid rgba(56, 189, 248, 0.45);
        background: linear-gradient(120deg, rgba(56, 189, 248, 0.15), rgba(168, 85, 247, 0.12));
        color: #c7d2fe;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .stat-box {
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
        padding: 10px;
        min-height: 76px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      @media (max-width: 640px) {
        .stat-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 30% 20%, rgba(88, 28, 135, 0.22), rgba(0, 0, 0, 0.75));
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 90;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-card {
        width: min(480px, 100%);
        background: linear-gradient(140deg, #0c1020, #0c1226 50%, #0a0f1b);
        border: 1px solid rgba(99, 102, 241, 0.3);
        border-radius: 18px;
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(56, 189, 248, 0.08);
        padding: 18px;
        color: #e2e8f0;
      }
      .modal-avatar {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        background: radial-gradient(circle at 30% 30%, rgba(250, 204, 21, 0.28), rgba(30, 41, 59, 0.9));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        margin: 0 auto 10px;
        border: 1px solid rgba(248, 250, 252, 0.12);
        box-shadow: 0 12px 45px rgba(168, 85, 247, 0.3);
      }
      .modal-close {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #e2e8f0;
        border-radius: 10px;
        width: 36px;
        height: 36px;
      }
      .modal-desc {
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 14px;
        padding: 10px 12px;
        font-size: 14px;
        color: #cbd5e1;
      }
      .modal-stat-list {
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
        padding: 12px;
        display: grid;
        gap: 10px;
      }
      .btn-equip {
        border: none;
        transition: transform 0.08s ease;
      }
      .btn-equip:active {
        transform: translateY(1px);
      }
      /* 美化數字輸入：移除原生箭頭並統一外觀 */
      input.stat-input {
        -moz-appearance: textfield;
        appearance: textfield;
        background: #0b1324;
        border: 1px solid rgba(148, 163, 184, 0.25);
        color: #e2e8f0;
        border-radius: 10px;
        padding: 6px 8px;
        font-weight: 600;
        text-align: right;
        outline: none;
        transition: border-color 0.12s ease, box-shadow 0.12s ease;
      }
      input.stat-input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
      }
      input.stat-input::-webkit-outer-spin-button,
      input.stat-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      /* EXP 提示泡泡 */
      .tooltip {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.25);
        color: #cbd5f5;
        font-size: 12px;
        cursor: default;
      }
      .tooltip:hover .tooltip-content {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, -6px);
      }
      .tooltip-content {
        position: absolute;
        bottom: 130%;
        left: 50%;
        transform: translate(-50%, 0);
        min-width: 220px;
        max-width: 260px;
        padding: 10px 12px;
        background: #0b1324;
        border: 1px solid rgba(56, 189, 248, 0.4);
        border-radius: 10px;
        color: #e2e8f0;
        font-size: 12px;
        line-height: 1.45;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease, transform 0.15s ease;
        z-index: 30;
      }
      .tooltip-content::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-width: 6px;
        border-style: solid;
        border-color: rgba(56, 189, 248, 0.4) transparent transparent transparent;
      }
      .tag {
        white-space: pre-line; /* 允許 \n 變成換行 */
        text-align: center;    /* 可選：置中 */
      }
      .synthesis-disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>

      async function fetchJSON(path, options = {}) {
        const url = `${API_BASE || ""}${path}`;
        const headers = { ...(options.headers || {}), ...NGROK_BYPASS_HEADER };
        const token = localStorage.getItem("ve_token");
        if (token) headers["Authorization"] = `Bearer ${token}`;
        if (options.body && !(options.body instanceof FormData)) {
          headers["Content-Type"] = "application/json";
        }
        const res = await fetch(url, {
          method: options.method || "GET",
          headers,
          body: options.body && !(options.body instanceof FormData) ? JSON.stringify(options.body) : options.body,
        });
        if (res.status === 401) {
          localStorage.removeItem("ve_token");
          window.location.href = "login.html";
          throw new Error("請先登入");
        }
        const text = await res.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch {
          throw new Error("伺服器回傳格式錯誤");
        }
        if (!res.ok) {
          const detail = data?.detail;
          const err = new Error((detail && detail.message) || detail || res.statusText || "Request failed");
          err.code = detail?.code;
          throw err;
        }
        return data;
      }

      function normalizeInventoryItem(raw = {}) {

      function renderProfileUI() {

      const EQUIP_SLOTS = [
        { key: "weapon", label: "武器", slot_type: "WEAPON" },
        { key: "shield", label: "盾牌", slot_type: "SHIELD" },
        { key: "armor", label: "鎧甲", slot_type: "ARMOR" },

      function buildEquippedFromInventory(items) {
        const used = new Set();
        return EQUIP_SLOTS.map((slot) => {
          const found = items.find((it) => !used.has(it.id) && it.slot_type === slot.slot_type);
          if (found) used.add(found.id);
          return found || null;
        });
      }

      function renderEquipUI(items) {
        const grid = document.createDocumentFragment();
        EQUIP_SLOTS.forEach((slot, idx) => {
          const node = document.createElement("div");

        equipGrid.innerHTML = "";
        equipGrid.appendChild(grid);
        equipCount.textContent = `${items.filter(Boolean).length} / ${EQUIP_SLOTS.length}`;

      function renderBagUI(list) {
  const maxSlots = 12;
  const filled = list.slice(0, maxSlots);
  const fragment = document.createDocumentFragment();

  // 每次重畫先清空
  bagGrid.innerHTML = "";

  filled.forEach((item) => {
    // 合成模式下，這個 item 已經被選了幾個
    const selectedCount = synthesisMode ? (selectedForSynthesis[item.id] || 0) : 0;
    // 一般模式下，是否是目前選來看詳細資訊的
    const isSelected = !synthesisMode && selectedBagItemId === item.id;
    // 是否是目前裝備中的
    const isEquipped = equippedSlots.some((eq) => eq && eq.id === item.id);

    const cell = document.createElement("div");
    cell.className =
      "grid-slot active" +
      (isSelected ? " selected" : "") +
      (isEquipped ? " equipped" : "") +
      (selectedCount > 0 ? " synthesis-selected" : "") +
      (synthesisMode && isEquipped ? " synthesis-disabled" : "");

    const name = document.createElement("div");
    name.className = `text-sm font-semibold ${rarityClass(item.rarity)}`;
    name.textContent = item.name || "道具";

    const qty = document.createElement("div");
    qty.className = "tag";
    qty.textContent = `x${item.qty || 1}`;

    const meta = document.createElement("div");
    meta.className = "tag";
    if (synthesisMode) {
      if (isEquipped) {
        meta.textContent = "已裝備中，無法合成";
      } else {
        meta.textContent =
          selectedCount > 0
            ? `合成中：${selectedCount}/${item.qty || 1}`
            : "點擊選擇\n合成數量"; // 用 \n 斷行
      }
    } else {
      meta.textContent = item.slot_type
        ? `類別：${slotLabel(item.slot_type)}`
        : "";
    }

    cell.append(name, qty, meta);

    cell.addEventListener("click", () => {
  if (synthesisMode) {
    // 1) 裝備中的不能當素材
    if (isEquipped) {
      return;
    }

    const maxQty = item.qty || 1;
    const current = selectedForSynthesis[item.id] || 0;

    // 2) 計算目前已選的「總件數」
    const totalSelected = Object.values(selectedForSynthesis)
      .reduce((sum, c) => sum + c, 0);

    // 3) 準備下一個數量：0(未選) → 1 → 2 → ... → maxQty → 0(取消)
    let next = current + 1;

    if (next > maxQty) {
      // 循環回 0：這是「減少」選取，總數會變少 → 永遠允許
      next = 0;
    } else {
      // 這裡是「從 current 增加 1」
      // 如果目前總數已經 >= 2，就不允許再多選
      if (totalSelected >= 2) {
        alert("一次最多只能選取兩件素材進行合成。");
        return;
      }
      // （totalSelected 一定 <= 1，所以 totalSelected + 1 <= 2，安全）
    }

    if (next === 0) {
      delete selectedForSynthesis[item.id];  // 取消選取
    } else {
      selectedForSynthesis[item.id] = next;  // 更新選取數量
    }

    renderBagUI(inventory);
    return;
  }

  // ⬇️ 下面保持你原本的非合成模式邏輯
  const isCurrentlySelectedForModal = selectedBagItemId === item.id;

  Array.from(bagGrid.children).forEach((child) => {
    child.classList.remove("selected");
  });

  if (isCurrentlySelectedForModal) {
    selectedBagItemId = null;
  } else {
    selectedBagItemId = item.id;
    cell.classList.add("selected");

    const slotUpper = (item.slot_type || "").toUpperCase();
    const equipable = EQUIP_SLOTS.some((s) => s.slot_type === slotUpper);
    if (equipable) {
      renderEquipModal(item);
    }
  }
});

    fragment.appendChild(cell);
  });

  // 空格
  for (let i = filled.length; i < maxSlots; i++) {
    const empty = document.createElement("div");
    empty.className = "grid-slot";
    empty.innerHTML = '<div class="text-slate-500 text-sm">空格</div>';
    fragment.appendChild(empty);
  }

  bagGrid.appendChild(fragment);

  const totalQty = list.reduce((s, it) => s + Number(it.qty || 0), 0);
  bagCount.textContent = `${totalQty} / 500`;
}

      async function loadProfile() {
        if (!currentUser) return;
        profile = await fetchJSON(`/api/users/${encodeURIComponent(currentUser.discord_id)}`);
        renderProfileUI();
      }

      async function loadWallet() {
        if (!currentUser) return;
        wallet = await fetchJSON(`/api/wallet/${encodeURIComponent(currentUser.discord_id)}`);
        renderWalletUI();
      }

      async function loadInventory() {
        if (!currentUser) return;
        const summary = await fetchJSON(`/api/inventory/${encodeURIComponent(currentUser.discord_id)}/summary`);
        const items = Array.isArray(summary?.items) ? summary.items : [];
        const normalized = items
          .map((it) => normalizeInventoryItem(it))
          .filter((it) => (it.qty || 0) > 0);
        inventory = normalized;

        if (profile) {
          const mapped = EQUIP_SLOTS.map((slot) => {
            const idKey = `equip_${slot.key}_id`;
            const targetTemplateId = profile[idKey];
            if (!targetTemplateId) return null;
            return normalized.find((it) => it.item_template_id === targetTemplateId) || null;
          });
          const allNull = mapped.every((x) => !x);
          equippedSlots = allNull ? new Array(EQUIP_SLOTS.length).fill(null) : mapped;
        } else if (equippedSlots.every((x) => !x)) {
          equippedSlots = buildEquippedFromInventory(normalized);
        } else {
          equippedSlots = equippedSlots.map((eq) => (eq && normalized.find((it) => it.id === eq.id)) || null);
        }

        renderEquipUI(equippedSlots);
        renderBagUI(normalized);

        if (summary && typeof summary.total_qty === "number") {
          const cap = summary.capacity || 500;
          bagCount.textContent = `${summary.total_qty} / ${cap}`;
        }
      }

      async function persistEquipment() {
        if (!currentUser) return;
        const tmplId = (slot) => (slot ? slot.item_template_id || null : null);
        const payload = {
          weapon_template_id: tmplId(equippedSlots[0]),
          shield_template_id: tmplId(equippedSlots[1]),
          armor_template_id: tmplId(equippedSlots[2]),
          cloak_template_id: tmplId(equippedSlots[3]),
          head_template_id: tmplId(equippedSlots[4]),
          ring_template_id: tmplId(equippedSlots[5]),
          acc1_template_id: tmplId(equippedSlots[6]),
          acc2_template_id: tmplId(equippedSlots[7]),
        };
        try {
          const updated = await fetchJSON(`/api/users/${encodeURIComponent(currentUser.discord_id)}/equipment`, {
            method: "POST", body: payload });
          profile = updated;
          renderProfileUI();
        } catch (err) {
          console.error("儲存裝備失敗", err);
        }
      }

      async function submitStatPoints() {
        if (!profile || !currentUser) return;
        const payload = {
          attack: Number(allocAtk?.value || 0),
          defense: Number(allocDef?.value || 0),
          agility: Number(allocAgi?.value || 0),
          intelligence: Number(allocInt?.value || 0),
          luck: Number(allocLuk?.value || 0),
        };
        const spend = Object.values(payload).reduce((s, v) => s + (Number(v) || 0), 0);
        if (!spend || spend <= 0) {
          alert("請至少分配 1 點");
          return;
        }
        if ((profile.stat_points || 0) < spend) {
          alert("能力點不足");
          return;
        }
        try {
          const updated = await fetchJSON(`/api/users/${encodeURIComponent(currentUser.discord_id)}/allocate-points`, {
            method: "POST", body: payload });
          profile = updated;
          renderProfileUI();
          closeStatModal();
        } catch (err) {
          alert(err.message || "分配失敗");
        }
      }
      
      function setupSynthesis() {
  synthesisModeBtn.addEventListener("click", () => {
    synthesisMode = !synthesisMode;
    selectedForSynthesis = {}; // 切換模式時清空
    synthesisModeBtn.textContent = synthesisMode ? "取消合成" : "合成";
    confirmSynthesisBtn.classList.toggle("hidden", !synthesisMode);
    renderBagUI(inventory);
  });

  confirmSynthesisBtn.addEventListener("click", async () => {
    // 把 { id: count } 展開成 [id, id, id...]
    const inventoryItemIds = [];
    for (const [id, count] of Object.entries(selectedForSynthesis)) {
      for (let i = 0; i < count; i++) {
        inventoryItemIds.push(Number(id));
      }
    }

    if (inventoryItemIds.length < 2) {
      alert("請至少選擇兩件物品來合成。");
      return;
    }

    confirmSynthesisBtn.disabled = true;
    confirmSynthesisBtn.textContent = "合成中...";

    try {
      const payload = {
        discord_id: currentUser.discord_id,
        inventory_item_ids: inventoryItemIds, // 可以包含重複 ID
      };
      const newItemTemplate = await fetchJSON("/api/synthesis", {
        method: "POST",
        body: payload,
      });

      alert(
        `合成成功！\n獲得新物品：${newItemTemplate.name}\n${newItemTemplate.description}`,
      );

      synthesisMode = false;
      selectedForSynthesis = {};
      synthesisModeBtn.textContent = "合成";
      confirmSynthesisBtn.classList.add("hidden");
      await loadInventory();
    } catch (err) {
      alert(`合成失敗：${err.message || "未知錯誤"}`);
      // Reload inventory to reflect consumed materials
      await loadInventory();
    } finally {
      confirmSynthesisBtn.disabled = false;
      confirmSynthesisBtn.textContent = "確認合成";
    }
  });
}




      async function init() {
        ensureUser();
        setupMobileMenu();
        setupSynthesis(); // Setup synthesis listeners
        try {
          await loadProfile();
        } catch (e) {
          console.error("Error loading profile:", e);
        }
        try {
          await loadWallet();
        } catch (e) {
          console.error("Error loading wallet:", e);
        }
        try {
          await loadInventory();
        } catch (e) {
          console.error("Error loading inventory:", e);
        }
        if (logoutBtnDesktop) logoutBtnDesktop.addEventListener("click", logout);
        if (logoutBtnMobile) logoutBtnMobile.addEventListener("click", logout);
        if (equipModalClose) equipModalClose.addEventListener("click", closeEquipModal);
        if (equipModal) {
          equipModal.addEventListener("click", (e) => {
            if (e.target === equipModal) closeEquipModal();
          });
        }
        if (equipModalAction) {
          equipModalAction.addEventListener("click", () => {
            if (!currentModalItem) return;
            const equipped = equippedSlots.some((eq) => eq && eq.id === currentModalItem.id);
            if (equipped) {
              unequipItem(currentModalItem);
            } else {
              equipItem(currentModalItem);
            }
            renderEquipModal(currentModalItem);
            closeEquipModal();
          });
        }
        if (openStatModal && statModal) {
          openStatModal.addEventListener("click", () => {
            if (!profile || (profile.stat_points || 0) <= 0) {
              alert("沒有可分配的能力點");
              return;
            }
            statModal.classList.add("active");
          });
        }
        if (statModalClose) statModalClose.addEventListener("click", closeStatModal);
        if (statModalCancel) statModalCancel.addEventListener("click", closeStatModal);
        if (statModal) {
          statModal.addEventListener("click", (e) => {
            if (e.target === statModal) closeStatModal();
          });
        }
        if (statModalSubmit) statModalSubmit.addEventListener("click", submitStatPoints);
      }

      init();
    </script>
  </body>
