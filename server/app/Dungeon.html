  <script>
    const API_BASE = 'https://built-spelling-conduct-providence.trycloudflare.com';
    const NGROK_BYPASS_HEADER = { 'ngrok-skip-browser-warning': 'true' };
    async function fetchJSON(path, options = {}) {
      const url = `${API_BASE || ''}${path}`;
      const headers = { ...(options.headers || {}), ...NGROK_BYPASS_HEADER };
      if (options.body && !(options.body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
      }
      const res = await fetch(url, {
        method: options.method || 'GET',
        headers,
        body: options.body && !(options.body instanceof FormData) ? JSON.stringify(options.body) : options.body,
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { /* ignore */ }
      if (!res.ok) throw new Error((data && data.detail) || res.statusText || 'Request failed');
      return data;
    }
    const rawUser = localStorage.getItem('virtual_exchange_user') || localStorage.getItem('user_profile');
    const sessionUser = rawUser ? JSON.parse(rawUser) : null;
    const isLoggedIn = !!sessionUser; // true 表示已登入
    const userName = sessionUser?.username || sessionUser?.discord_name || sessionUser?.email || '勇者';
    const playerLevel = sessionUser?.level || 1;
    const userMenuWrapper = document.getElementById('userMenuWrapper');
    const userMenuButton = document.getElementById('userMenuButton');
    const userMenuLabel = document.getElementById('userMenuLabel');
    const userMenuAvatar = document.getElementById('userMenuAvatar');
    const userMenuArrow = document.getElementById('userMenuArrow');
    const userDropdown = document.getElementById('userDropdown');
    const personalCenterLink = document.getElementById('personalCenterLink');
    const logoutBtnDesktop = document.getElementById('logoutBtnDesktop');
    const mobileLoginLink = document.getElementById('loginLinkMobile');
    const mobileLogoutBtn = document.getElementById('logoutBtnMobile');
      const mobileUserCard = document.getElementById('mobileUserCard');
      const mobileUserName = document.getElementById('mobileUserName');
      const mobileUserId = document.getElementById('mobileUserId');
    const guestButtonClass =
        "flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-r from-fuchsia-400 to-cyan-300 text-slate-900 font-semibold shadow-lg shadow-fuchsia-500/30 hover:scale-[1.02] transition";
      const userButtonClass =
        "flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-900/70 border border-slate-700 text-slate-100 font-semibold shadow-lg hover:border-cyan-300/60 transition";
    let cachedUser = sessionUser || null;
    let dropdownTimer = null;
    function applyUserState() {
        if (!cachedUser) {
          try {
            const raw = localStorage.getItem('virtual_exchange_user') || localStorage.getItem('user_profile');
            if (raw) cachedUser = JSON.parse(raw);
          } catch {}
        }
        if (!cachedUser) {
          clearUserState();
          return;
        }
        const name = cachedUser.discord_name || cachedUser.email || cachedUser.discord_id || '已登入';
        if (userMenuLabel) userMenuLabel.textContent = name;
        if (userMenuAvatar) {
          userMenuAvatar.textContent = (name || '用戶').trim().charAt(0) || '用';
          userMenuAvatar.classList.remove('hidden');
        }
        if (userMenuButton) userMenuButton.className = userButtonClass;
        if (userMenuArrow) userMenuArrow.classList.remove('hidden');
        if (personalCenterLink) personalCenterLink.classList.remove('hidden');
        if (mobileLoginLink) {
          mobileLoginLink.classList.add('hidden');
        }
        if (mobileUserCard) mobileUserCard.classList.remove('hidden');
        if (mobileUserName) mobileUserName.textContent = name || '用戶';
        if (mobileUserId) mobileUserId.textContent = cachedUser.discord_id ? `ID #${cachedUser.discord_id}` : 'ID #-';
        if (mobileLogoutBtn) mobileLogoutBtn.classList.remove('hidden');
        hideUserDropdown();
      }
      function clearUserState() {
        cachedUser = null;
        if (userMenuLabel) userMenuLabel.textContent = '登入';
        if (userMenuAvatar) {
          userMenuAvatar.textContent = '';
          userMenuAvatar.classList.add('hidden');
        }
        if (userMenuButton) userMenuButton.className = guestButtonClass;
        if (userMenuArrow) userMenuArrow.classList.add('hidden');
        if (userDropdown) userDropdown.classList.add('hidden');
        if (personalCenterLink) personalCenterLink.classList.add('hidden');
        if (mobileLoginLink) {
          mobileLoginLink.textContent = '登入';
          mobileLoginLink.href = 'login.html';
          mobileLoginLink.classList.remove('hidden');
        }
        if (mobileLogoutBtn) mobileLogoutBtn.classList.add('hidden');
        if (mobileUserCard) mobileUserCard.classList.add('hidden');
      }

      function logoutUser() {
        localStorage.removeItem('virtual_exchange_user');
        clearUserState();
        window.location.href = 'index.html';
      }
      function showUserDropdown() {
        if (!cachedUser || !userDropdown) return;
        if (dropdownTimer) clearTimeout(dropdownTimer);
        userDropdown.classList.remove('hidden');
      }

      function hideUserDropdown() {
        if (!userDropdown) return;
        if (dropdownTimer) clearTimeout(dropdownTimer);
        dropdownTimer = setTimeout(() => userDropdown.classList.add('hidden'), 120);
      }

      clearUserState();
      applyUserState();
      const mobileBtn = document.getElementById('mobileMenuBtn');
      const mobileMenu = document.getElementById('mobileMenu');
      const mobilePanel = document.getElementById('mobilePanel');
      const mobileOverlay = document.getElementById('mobileOverlay');
      const logoutDesktop = document.getElementById('logoutBtnDesktop');
      const logoutMobile = document.getElementById('logoutBtnMobile');
    if (logoutDesktop) logoutDesktop.addEventListener('click', logoutUser);
    if (logoutMobile) logoutMobile.addEventListener('click', logoutUser);

    if (userMenuWrapper) {
        userMenuWrapper.addEventListener('mouseenter', showUserDropdown);
        userMenuWrapper.addEventListener('mouseleave', hideUserDropdown);
    }

    if (userMenuButton) {
        // hover 也展開
        userMenuButton.addEventListener('mouseenter', showUserDropdown);
        userMenuButton.addEventListener('click', () => {
          if (!cachedUser) {
            window.location.href = 'login.html';
            return;
          }
          if (userDropdown?.classList.contains('hidden')) {
            showUserDropdown();
          } else {
            hideUserDropdown();
          }
        });
    }
    if (userDropdown) {
        userDropdown.addEventListener('mouseenter', showUserDropdown);
        userDropdown.addEventListener('mouseleave', hideUserDropdown);
    }
      
    let dungeons = [];
    let isLoading = false;
    let loadError = '';

    function generateRandomDrop(dungeonLevel) {
      const rarityRoll = Math.random();
      let rarity = 'common';
      if (rarityRoll < 0.05) rarity = 'legendary';
      else if (rarityRoll < 0.2) rarity = 'epic';
      else if (rarityRoll < 0.5) rarity = 'rare';

      const rarityMultiplier = { common: 1, rare: 2, epic: 3, legendary: 5 };
      const itemTypes = [
        { name: '長劍', icon: '⚔️', mainStat: 'attack' },
        { name: '戰盾', icon: '🛡️', mainStat: 'defense' },
        { name: '短刃', icon: '🥷', mainStat: 'agility' },
        { name: '魔杖', icon: '✨', mainStat: 'intelligence' },
        { name: '護符', icon: '🍀', mainStat: 'luck' },
      ];

      const baseStats = dungeonLevel * 2;
      const multiplier = rarityMultiplier[rarity];
      const itemType = itemTypes[Math.floor(Math.random() * itemTypes.length)];

      const stats = {
        attack: itemType.mainStat === 'attack' ? baseStats * multiplier : Math.floor(baseStats * multiplier * 0.3),
        defense: itemType.mainStat === 'defense' ? baseStats * multiplier : Math.floor(baseStats * multiplier * 0.3),
        agility: itemType.mainStat === 'agility' ? baseStats * multiplier : Math.floor(baseStats * multiplier * 0.2),
        intelligence: itemType.mainStat === 'intelligence' ? baseStats * multiplier : Math.floor(baseStats * multiplier * 0.3),
        luck: itemType.mainStat === 'luck' ? baseStats * multiplier : Math.floor(baseStats * multiplier * 0.1),
      };

      const prefix = rarity === 'legendary' ? '傳說' : rarity === 'epic' ? '史詩' : rarity === 'rare' ? '稀有' : '普通';
      return {
        id: `${Date.now()}-${Math.random()}`,
        name: `${prefix}${itemType.name}`,
        rarity,
        stats,
        icon: itemType.icon,
        slot_type: 'MISC',
      };
    }

    function pickDropsFromTarget(target) {
      const drops = [];
      const dropDefs = Array.isArray(target?.drops) ? target.drops : [];
      dropDefs.forEach((d) => {
        const rate = typeof d.drop_rate === 'number' ? d.drop_rate : 0;
        if (Math.random() > rate) return;
        const qtyMin = d.qty_min ?? 1;
        const qtyMax = d.qty_max ?? qtyMin;
        const qty = Math.max(qtyMin, Math.floor(Math.random() * (qtyMax - qtyMin + 1)) + qtyMin);
        const tmpl = d.item_template || {};
        const rarity = (tmpl.rarity || 'COMMON').toLowerCase();
        const stats = {
          attack: tmpl.stat_attack || 0,
          defense: tmpl.stat_defense || 0,
          agility: tmpl.stat_agility || 0,
          intelligence: tmpl.stat_intelligence || 0,
          luck: tmpl.stat_luck || 0,
        };
        for (let i = 0; i < qty; i++) {
          drops.push({
            id: `${Date.now()}-${Math.random()}`,
            name: tmpl.name || '未知物品',
            rarity: rarity === 'legendary' || rarity === 'epic' || rarity === 'rare' ? rarity : 'common',
            stats,
            icon: '🎁',
            slot_type: tmpl.slot_type || 'MISC',
          });
        }
      });
      return drops;
    }

    function getPlayerStats() {
      return {
        atk: Number(cachedUser?.stat_attack ?? 10),
        def: Number(cachedUser?.stat_defense ?? 0),
        agi: Number(cachedUser?.stat_agility ?? 0),
        int: Number(cachedUser?.stat_int ?? 0),
        luk: Number(cachedUser?.stat_luk ?? 0),
      };
    }

    function playerDamageRoll(target) {
      const { atk, luk } = getPlayerStats();
      const base = Math.max(1, Math.floor(atk)); // 能力值 1 就打 1
      const critChance = Math.min(0.5, Math.max(0, luk) / 100); // 每點幸運 +1%，上限 50%
      const isCrit = Math.random() < critChance;
      const dmg = base;
      return isCrit ? Math.floor(dmg * 1.5) : dmg;
    }

    function monsterDamageRoll(boss) {
      const { def } = getPlayerStats();
      const atk = Math.max(1, Math.floor(boss.attack ?? 1));
      const dmgBeforeDef = atk;
      const reduced = Math.max(1, dmgBeforeDef - Math.floor(def * 0.4));
      return reduced;
    }

    function simulateBattle(dungeon) {
      let pHP = 100;
      const battleBoss = dungeon._battleBoss || dungeon.boss || {
        name: 'Boss',
        level: dungeon.level_req || 1,
        hp: 50,
        attack: 10,
      };
      let mHP = battleBoss.hp ?? battleBoss.max_hp ?? 50;

      battleInterval = setInterval(() => {
        const playerDamage = playerDamageRoll(battleBoss);
        mHP -= playerDamage;
        monsterHP = mHP;
        pushLog(`你造成了 ${playerDamage} 點傷害！`);
        renderBattleState();

        if (mHP <= 0) {
          endBattle('win', dungeon);
          return;
        }

        monsterTimeout = setTimeout(() => {
          const monsterDamage = monsterDamageRoll(battleBoss);
          pHP -= monsterDamage;
          playerHP = Math.max(0, pHP);
          pushLog(`${battleBoss.name || 'Boss'} 對你造成了 ${monsterDamage} 點傷害！`);
          renderBattleState();

          if (pHP <= 0) {
            endBattle('lose', dungeon);
          }
        }, 500);
      }, 1500);
    }

    function endBattle(result, dungeon) {
      clearInterval(battleInterval);
      clearTimeout(monsterTimeout);
      isBattling = false;
      battleResult = result;
      renderLogs();
      const battleBoss = dungeon._battleBoss || dungeon.boss || { name: 'Boss', level: dungeon.level_req || 1 };

      battleResultBox.classList.remove('hidden');
      if (result === 'win') {
        winPanel.classList.remove('hidden');
        losePanel.classList.add('hidden');
        rewardText.innerHTML = `<div>擊敗 ${battleBoss.name || 'Boss'}</div>`;

        const drops = pickDropsFromTarget(battleBoss);
        droppedItems = drops;
        dropList.innerHTML = '';
        if (droppedItems.length) {
          dropSection.classList.remove('hidden');
          renderDrops();
        } else {
          dropSection.classList.add('hidden');
        }
        replayButton.classList.remove('hidden');
      } else {
        losePanel.classList.remove('hidden');
        winPanel.classList.add('hidden');
        dropSection.classList.add('hidden');
        replayButton.classList.add('hidden');
      }
    }

    function resetBattle(goToDungeonList = false) {
      clearInterval(battleInterval);
      clearTimeout(monsterTimeout);
      isBattling = false;
      battleResult = null;
      droppedItems = [];
      battleLog = [];
      selectedTarget = null;
      startBattleButton.disabled = true;
      selectedDungeon._battleBoss = null;

      // 回到地城內的選怪畫面
      battleResultBox.classList.add('hidden');
      dropSection.classList.add('hidden');
      winPanel.classList.add('hidden');
      losePanel.classList.add('hidden');
      replayButton.classList.add('hidden');
      battleLogBox.classList.add('hidden');
      document.getElementById('battle-ui')?.classList.add('hidden');

      if (goToDungeonList) {
        selectedDungeon = null;
        encounterSelect.classList.add('hidden');
        battleArea.classList.add('hidden');
        dungeonList.classList.remove('hidden');
        return;
      }

      if (selectedDungeon) {
        encounterSelect.classList.remove('hidden');
        battleArea.classList.remove('hidden');
        renderBattleState();
      } else {
        // 若沒有已選地城，回列表
        battleArea.classList.add('hidden');
        dungeonList.classList.remove('hidden');
      }
    }

    // remove single backButton binding (handled above)
    replayButton.addEventListener('click', () => selectedDungeon && startBattle());
    startBattleButton.addEventListener('click', () => startBattle());
    bossCard?.addEventListener('click', () => setSelectedTarget(selectedDungeon?.boss));

    async function loadDungeons() {
      try {
        isLoading = true;
        loadError = '';
        renderDungeonCards();
        const data = await fetchJSON('/api/dungeons');
        dungeons = Array.isArray(data) ? data : [];
      } catch (err) {
        loadError = err?.message || '未知錯誤';
      } finally {
        isLoading = false;
        renderDungeonCards();
      }
    }

    async function getItemTemplate(id) {
      if (!id) return null;
      if (itemTemplateCache[id]) return itemTemplateCache[id];
      try {
        const tpl = await fetchJSON(`/api/item-templates/${id}`);
        itemTemplateCache[id] = tpl;
        return tpl;
      } catch (err) {
        return null;
      }
    }

    async function enrichEquip(equipArr) {
      if (!Array.isArray(equipArr)) return [];
      const tasks = equipArr.map(async (eq) => {
        if (!eq?.id) return eq;
        const tpl = await getItemTemplate(eq.id);
        if (!tpl) return eq;
        return {
          ...eq,
          name: tpl.name || eq.name,
          rarity: tpl.rarity ? tpl.rarity.toLowerCase() : eq.rarity,
          slot_type: tpl.slot_type || eq.slot_type,
        };
      });
      return Promise.all(tasks);
    }

    async function loadUserEquipment() {
      if (!cachedUser?.discord_id) return;
      const buildEquipFromIds = (u) => {
        if (!u) return [];
        const pairs = [
          { key: 'WEAPON', field: 'equip_weapon_id', label: '武器' },
          { key: 'SHIELD', field: 'equip_shield_id', label: '盾牌' },
          { key: 'ARMOR', field: 'equip_armor_id', label: '鎧甲' },
          { key: 'CLOAK', field: 'equip_cloak_id', label: '披風' },
          { key: 'HEAD', field: 'equip_head_id', label: '頭飾' },
          { key: 'RING', field: 'equip_ring_id', label: '戒指' },
          { key: 'ACCESSORY1', field: 'equip_acc1_id', label: '飾品1' },
          { key: 'ACCESSORY2', field: 'equip_acc2_id', label: '飾品2' },
        ];
        return pairs
          .filter((p) => u[p.field])
          .map((p) => ({
            id: u[p.field],
            slot_type: p.key,
            name: `裝備 ID ${u[p.field]}`,
            rarity: 'common',
          }));
      };
      try {
        const data = await fetchJSON(`/api/users/${cachedUser.discord_id}`);
        if (data) {
          const equipFromIds = buildEquipFromIds(data);
          const baseEquip = Array.isArray(data.equipment) && data.equipment.length
            ? data.equipment
            : equipFromIds;
          const mergedEquip = await enrichEquip(baseEquip);
          cachedUser = { ...(cachedUser || {}), ...data, equipment: mergedEquip };
          renderEquipmentPanel();
          renderPlayerStats();
        }
      } catch (err) {
        console.warn('載入裝備失敗', err);
      }
    }

    async function init() {
  if (!isLoggedIn) {
    loginBlock.classList.remove('hidden');
    dungeonBlock.classList.add('hidden');
    return;
  }

  loginBlock.classList.add('hidden');
  dungeonBlock.classList.remove('hidden');

  await loadUserEquipment(); // ← 現在可以 await
  loadDungeons();
}

    init();

    // Back buttons
    backButtons.forEach((btn) => btn.addEventListener('click', () => resetBattle(false)));
    backListButton?.addEventListener('click', () => resetBattle(true));
  </script>
</body>
</html>
